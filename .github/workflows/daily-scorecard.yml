name: Daily AE Scorecard

on:
  schedule:
    # Every day at 5am ET (10am UTC during EST, 9am UTC during EDT)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  score-calls:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run daily scorecard
        env:
          GONG_ACCESS_KEY: ${{ secrets.GONG_ACCESS_KEY }}
          GONG_ACCESS_KEY_SECRET: ${{ secrets.GONG_ACCESS_KEY_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL_ANDREW: ${{ secrets.SLACK_WEBHOOK_URL_ANDREW }}
          SLACK_WEBHOOK_URL_JOHN: ${{ secrets.SLACK_WEBHOOK_URL_JOHN }}
        run: node score.js

      - name: Commit and push updated dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Daily scorecard update — $(date +'%Y-%m-%d')"
          git push
