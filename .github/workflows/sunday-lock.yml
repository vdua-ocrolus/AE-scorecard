name: Sunday Lock

on:
  schedule:
    # Sunday at 5am ET (10am UTC during EST, 9am UTC during EDT)
    - cron: '0 10 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  lock-week:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run Sunday lock
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: node lock.js

      - name: Commit and push locked dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --quiet --cached || git commit -m "Sunday lock — archive week and clear dashboard"
          git push
