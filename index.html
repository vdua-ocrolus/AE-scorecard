*{margin:0;padding:0;box-sizing:border-box}

.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}

.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}

ision makers and budget approval process before next call"],"url":"https://us-29990.app.gong.io/call?id=5621670770442726823"},{"id":5,"rep":"sam","title":"VanDyk X Ocrolus - Roadmap and Conditioning","prospect":"Multiple stakeholders","date":"Mon 3/30","dur":"30m","type":"Closing","stage":"Closing","s":{"r":7,"d":4,"v":7,"a":6,"c":6,"e":5},"w":5.75,"tr":0.87,"m":{"M":0,"E":1,"DC":1,"DP":0,"IP":0,"Ch":0,"Co":0},"str":["Strong product roadmap presentation with client-centric messaging and clear themes","Good positioning of future value with conditioning solution beta and scalability benefits"],"opp":["Discovery was minimal - need to explore decision criteria, alternatives, and business impact","Weak advancement with vague next steps instead of specific commitments and timeline"],"q":"Right now, I need the agreement and I will get back to you.","coach":"Nice job orchestrating Rebecca's roadmap presentation with strong client-centric themes around feedback-driven development and scalability. Your rapport building was natural and the product positioning was compelling. Next time, invest more in discovery around their evaluation criteria and decision timeline - you had opportunities to understand what factors matter most and who influences the final call. Also consider firming up next steps beyond just 'get back to you' - try for specific check-in dates tied to their internal milestones.","prep":["Prepare discovery questions about decision criteria and evaluation process for next interaction","Follow up with revised contract incorporating discussed terms within 24 hours","Schedule specific follow-up tied to their board meeting timeline rather than waiting for their callback"],"url":"https://us-29990.app.gong.io/call?id=5868927367257921897"},{"id":6,"rep":"sam","title":"Sistar Mortgage X Ocrolus - POV Planning","prospect":"Multiple stakeholders","date":"Tue 3/31","dur":"23m","type":"POV Active","stage":"POV Active","s":{"r":6,"d":4,"v":6,"a":7,"c":7,"e":5},"w":5.55,"tr":43 const coaching={"sam":{"narrative":"Strong week with 15 calls averaging 5.9 across diverse prospects from banks to mortgage lenders. Your best performances came when balancing technical expertise with business discovery - the CME Lending demo (7.45) and Alicia pilot planning (6.95) stand out as examples of driving clear next steps while uncovering key stakeholder dynamics.","keep":"<strong>Lead with business impact discovery before technical demonstrations.</strong> Your CME Lending and Members First calls showed how opening with pain point questions creates more targeted demos. When you asked about current manual processes first, prospects stayed more engaged throughout technical walkthroughs.","start":"<strong>Quantify value propositions with specific dollar impacts.</strong> You mentioned 70-90% efficiency improvements to Alicia and time savings to others, but consider translating these into concrete cost savings per loan or hours saved monthly. Paula at United Home Loans was primed for ROI discussion after mentioning vendor PTSD.","stop":"<strong>Ending calls without concrete next steps and timelines.</strong> Several strong technical conversations like Icon Mortgage and VanDyk concluded with vague follow-ups rather than specific check-in dates tied to their evaluation milestones. Even when prospects seem engaged, always secure mutual action plans.","frameworkCoaching":"Your technical credibility consistently shines through - prospects like the CME team and Members First clearly trusted your expertise and stayed engaged throughout detailed demonstrations. This foundation of competence is crucial, but the highest-scoring calls this week shared a common pattern: you balanced technical depth with business context. Notice how the Alicia pilot planning call earned a 6.95 not just because of rapport, but because you quantified efficiency gains and immediately addressed her rollout concerns by bringing in change management support.<br><br>The discovery patterns in your C calls would benefit from brief agenda-setting to reinforce your consultative approach.","stop":"<strong>Diving into solutions before fully qualifying current state metrics.</strong> On calls like Verity and Directions Home Loan, you moved to demos before capturing specific data points like processing volumes, error rates, or timeline pressures that would strengthen your ROI case and make presentations more targeted.","frameworkCoaching":"Your natural relationship-building ability is a significant competitive advantage - prospects consistently show comfort and trust, which directly translates to deal velocity. The key is leveraging that rapport to create space for deeper business conversations. When Steadfast's Shawn immediately wanted to move forward after your Omaha connection, that demonstrates how personal trust accelerates buying decisions.<br><br>The pattern across your highest-scoring calls shows you excel when you balance relationship elements with structured business discussion. Your Mortgage Financial Services call (6.25) combined strong ROI articulation with relationship building, while maintaining clear next steps. Consider using your rapport-building moments as natural transitions into business discovery - once you've established that personal connection, prospects are typically more open to sharing challenges and constraints.<br><br>Your technical credibility shines through consistently, particularly evident in the LenderLogix partnership discussion where Patrick extensively detailed their architecture. The opportunity is to <strong>front-load more qualifying questions</strong> about current metrics and pain points before demonstrating solutions, so your technical expertise directly addresses their specific business impact rather than just showing what's possible."},"charlie":{"narrative":"Strong week with 6 out of 7 calls scoring above 5.0, led by your Bank of Canton ICE conference follow-up (7.35) and Travis Credit Union commercial discussion (7.25) hat's the biggest bottleneck you're anticipating?\" Your technical depth gives you permission to ask these strategic questions - prospects trust your expertise enough to share deeper insights when you create space for them to talk."},"spencer":{"narrative":"Strong week with 6 calls averaging 5.17, showing consistent rapport building and solid discovery skills. Your Ocrolus & Square call (5.7) demonstrated excellent questioning to help Keishawn build his business case, while the MAXEX demo effectively uncovered manual process pain points and positioned mortgage expertise.","keep":"<strong>Your natural rapport building creates authentic connections.</strong> From family discussions with Greylock to understanding Keishawn's internal challenges at Square, you consistently establish trust that opens doors for deeper business conversations.","start":"<strong>Quantify pain points when prospects reveal process issues.</strong> When Quentin mentioned 2-3 day verification delays or MAXEX described manual processes, these were perfect moments to explore the dollar cost of inefficiency and build stronger value justification.","stop":"<strong>Leaving next steps vague or putting the ball back in their court.</strong> With Keishawn you waited for him to 'get back to you,' and several other calls ended without specific mutual commitments or timelines that maintain momentum.","frameworkCoaching":"Your discovery instincts are solid, but consider the difference between finding pain and quantifying it. When prospects volunteer process issues - like Quentin's verification delays or MAXEX's manual workflows - that's your cue to dig deeper with questions like 'How many files does that impact per month?' or 'What's the cost when deals slow down?' This transforms features into business cases.<br><br>Your rapport building naturally opens doors for these deeper conversations. The trust you build with prospects like Keishawn creates permission to ask the harder quantification questions that he ould be doing the math out loud — not listening. That question, asked three or four times throughout the ROI walkthrough, creates the conversation that builds internal commitment.<br><br>The partner approval element was mentioned but not mapped. Amy referenced partners needing to weigh in, and Sam moved past it. The Voss play here is an accusation audit: 'You're probably thinking the partner approval process is going to slow this down.' Saying the scary thing out loud forces Amy to either confirm or disconfirm.<br><br>For MEDDPICC: Metrics (ROI calc) and Decision Process (partner approval) are touched. The Economic Buyer remains unidentified — who at HMA actually signs?","prep":["Ask: who at HMA approves a contract of this size?","Run an accusation audit on the partner approval","Prepare ROI scenarios in 3 tiers for the Becca call","Confirm March end-of-month pricing deadline creates urgency","Map competitive alternatives"],"url":"https://us-29990.app.gong.io/call?id=9085529724274902861"},{"id":3,"rep":"sam","title":"Superior Natl Bank POV","prospect":"Denise, Nicole","date":"Wed 3/19","dur":"31m","type":"POV Check-in","stage":"Testing","s":{"r":5,"d":5,"v":6,"a":6,"c":4,"e":7},"w":5.55,"tr":3,"m":{"M":0,"E":0,"DC":0,"DP":1,"IP":1,"Ch":1,"Co":0},"str":["Denise and Nicole highly engaged with SE Steph throughout","Tomorrow's meeting prep identified as key priority","Product accuracy validated by the team"],"opp":["AE arrived late and contributed 42 words in 31 minutes","SE carried the entire call — AE-prospect relationship at risk"],"q":"I really can't say enough about how pleasant of an experience this has been even through some hiccups.","coach":"This was Steph's call, not Sam's. The 42-word contribution on a 31-minute call is the single largest coaching issue this week. The risk is structural, not cosmetic. When the SE owns the relationship, the AE loses leverage at the table when it matters most: pricing, timeline pressure, and closing.<br><br>The product is clear <script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}

/* --- Google SSO Auth --- */
function decodeJwtPayload(token){
  var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join('')));
}

function handleGoogleSignIn(response){
  var payload=decodeJwtPayload(response.credential);
  var email=payload.email||'';
  if(!email.endsWith('@ocrolus.com')){
    document.getElementById('auth-error').style.display='block';
    return;
  }
  // Store session
  localStorage.setItem('ae-scorer-auth',JSON.stringify({
    email:email,
    name:payload.name||email,
    picture:payload.picture||'',
    exp:payload.exp*1000 // convert to ms
  }));
  showDashboard(email,payload.name||email,payload.picture||'');
  logAccess(email,'google_sso_login');
}

function showDashboard(email,name,picture){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('dashboard-content').style.display='block';
  var bar=document.getElementById('user-bar');
  bar.style.display='flex';
  document.getElementById('user-name').textContent=name;
  if(picture){
    document.getElementById('user-avatar').src=picture;
    document.getElementById('user-avatar').style.display='block';
  } else {
    document.getElementById('user-avatar').style.display='none';
  }
}

function signOut(){
  localStorage.removeItem('ae-scorer-auth');
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('user-bar').style.display='none';
  document.getElementById('auth-error').style.display='none';
  logAccess('','sign_out');
  // Revoke Google session
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}

// Check for existing valid session on page load
(function(){
  try{
    var saved=JSON.parse(localStorage.getItem('ae-scorer-auth'));
    if(saved && saved.email && saved.email.endsWith('@ocrolus.com') && saved.exp > Date.now()){
      showDashboard(saved.email,saved.name,saved.picture);
      logAccess(saved.email,'return_visit');
    } else if(saved){
      // Expired — clear it
      localStorage.removeItem('ae-scorer-auth');
    }
  }catch(e){
    // Legacy format or corrupted — clear
    localStorage.removeItem('ae-scorer-auth');
  }
})();
</script>
