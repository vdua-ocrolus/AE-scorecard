*{margin:0;padding:0;box-sizing:border-box}

.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}

const coaching={"sam":{"narrative":"Strong week with several high-performing calls, including standout scores with CME Lending Group (6.7) and United Home Loans (6.85) where your rapport-building and technical expertise created real momentum. Your pilot planning calls with Alicia showed excellent reference-based positioning, though pricing discussions revealed opportunities to strengthen commercial frameworks earlier in deals.","keep":"<strong>Your rapport-building creates genuine connection that drives engagement.</strong> The skiing conversation with My City Home Loans and conference follow-up with Peoples Bank show how naturally you connect personal elements to business conversations. This authentic approach keeps prospects engaged through technical demos and complex discussions.","start":"<strong>Ask calibrated questions to quantify business impact during discovery.</strong> When My City Home Loans shared '50 loans/month' and United Home Loans mentioned 'bottlenecks and rework,' you had perfect opportunities to ask follow-ups like 'What's your current processing time costing you?' These moments build compelling business cases that make pricing conversations easier later.","stop":"<strong>Leaving next steps vague instead of proposing concrete advancement.</strong> Several calls ended with loose commitments like 'hopefully connect with Mike' at United Home Loans or 'exchange emails' with Amanda. Consider proposing specific dates, prepared materials, or structured follow-up meetings that create clear momentum.","frameworkCoaching":"Your technical expertise and relationship skills are clearly resonating with prospects, but there's an opportunity to strengthen your commercial discovery framework. The pattern across your best calls — CME Lending Group, United Home Loans, and the Alicia pilot planning — shows you excel when prospects are already engaged. The key is building that same level of business urgency earlier in your sales cycles.<br><br>Consider adopting a 'pain-first' approach where you spend the first 10-15 minutes of demos understanding their current process challenges before showcasing solutions. When Peoples Bank mentioned manual processes or Icon Mortgage discussed integration pain, those were golden moments to quantify the business impact before diving into your technical capabilities. This creates a stronger foundation for pricing discussions and helps prospects self-justify investment decisions.<br><br>Your reference-based positioning with Alicia was <strong>excellent</strong> — citing 70-90% efficiency gains from proven implementations. Apply this same evidence-driven approach to discovery by asking prospects to quantify their current state, then you can position your solution as the bridge to measurable improvement."},"kyle":{"narrative":"Strong week with clear momentum building across multiple deals. Your Steadfast POV results call (7.25) showed excellent advancement with compelling data points, while proposal calls to Mission Mortgage and Mortgage Financial Services demonstrated solid commercial execution. The partnership discovery calls with Verity and LenderLogix show good pipeline development activity.","keep":"<strong>Continue leveraging personal connections to build authentic rapport.</strong> Your skiing conversation with NEXA, Omaha connection with Steadfast, and natural relationship building across multiple calls creates the trust foundation that drives deals forward. This genuine approach clearly resonates with prospects.","start":"<strong>Quantify business impact during discovery conversations.</strong> While you excel at uncovering technical challenges, try asking follow-up questions like 'What does a day saved in processing mean in revenue?' or 'How much would avoiding one additional hire be worth?' Your Directions call touched on efficiency but missed the dollar impact.","stop":"<strong>Stop letting rapport conversations consume too much call time without clear transitions.</strong> On your NEXA ons about the Encompass workflows — would a 20-minute focused session be useful for your team?' creates a second thread into the account.<br><br>On MEDDPICC: the Economic Buyer and Decision Process remain unidentified on a call that reached pricing. John 'letting Austin in' mid-call suggests John is the decision-maker, but that assumption needs to be validated. 'John, when you decide to move forward on a tool like this, who else is typically part of that conversation?' is a natural close question that unlocks the path to signature.","prep":["Ask John to quantify the capacity lift in dollar terms","Reach out to Austin directly for a focused Encompass workflow deep-dive","Ask about the decision process: who else is involved?","Probe competitive landscape before Tuesday","Build a preliminary ROI model using their team size and estimated file volume"],"url":"https://us-29990.app.gong.io/call?id=4567477048525966914"},{"id":2,"rep":"sam","title":"HMA Pricing","prospect":"Amy, Andrew (HMA)","date":"Mon 3/16","dur":"31m","type":"Pricing","stage":"Late Eval","s":{"r":8,"d":7,"v":8,"a":8,"c":7,"e":7},"w":7.45,"tr":75,"m":{"M":1,"E":0,"DC":1,"DP":1,"IP":0,"Ch":1,"Co":0},"str":["ROI calculator ready — walked through per-processor/UW economics","Offered success-based pricing structure for flexibility","Monday follow-up with product head Becca booked on-call"],"opp":["75% rep talk ratio too high even for pricing call","Partner approval path not mapped before close"],"q":"When you get done hobnobbing down there in vegas, let me know, let's get back on the phone and walk through that.","coach":"Arriving at a pricing call from ICE with an ROI calculator and a success-based pricing alternative is exactly the preparation this stage demands. Andrew's positive reaction confirms the flexibility framing landed. Monday 10am with Becca and the HMA team is a strong, specific next step.<br><br>The critical data point: 75% rep talk ratio on a pricing call. At the pricing stage, the prospect should be doing the math out loud — not listening. That question, asked three or four times throughout the ROI walkthrough, creates the conversation that builds internal commitment.<br><br>The partner approval element was mentioned but not mapped. Amy referenced partners needing to weigh in, and Sam moved past it. The Voss play here is an accusation audit: 'You're probably thinking the partner approval process is going to slow this down.' Saying the scary thing out loud forces Amy to either confirm or disconfirm.<br><br>For MEDDPICC: Metrics (ROI calc) and Decision Process (partner approval) are touched. The Economic Buyer remains unidentified — who at HMA actually signs?","prep":["Ask: who at HMA approves a contract of this size?","Run an accusation audit on the partner approval","Prepare ROI scenarios in 3 tiers for the Becca call","Confirm March end-of-month pricing deadline creates urgency","Map competitive alternatives"],"url":"https://us-29990.app.gong.io/call?id=9085529724274902861"},{"id":3,"rep":"sam","title":"Superior Natl Bank POV","prospect":"Denise, Nicole","date":"Wed 3/19","dur":"31m","type":"POV Check-in","stage":"Testing","s":{"r":5,"d":5,"v":6,"a":6,"c":4,"e":7},"w":5.55,"tr":3,"m":{"M":0,"E":0,"DC":0,"DP":1,"IP":1,"Ch":1,"Co":0},"str":["Denise and Nicole highly engaged with SE Steph throughout","Tomorrow's meeting prep identified as key priority","Product accuracy validated by the team"],"opp":["AE arrived late and contributed 42 words in 31 minutes","SE carried the entire call — AE-prospect relationship at risk"],"q":"I really can't say enough about how pleasant of an experience this has been even through some hiccups.","coach":"This was Steph's call, not Sam's. The 42-word contribution on a 31-minute call is the single largest coaching issue this week. The risk is structural, not cosmetic. When the SE owns the relationship, the AE loses leverage at the table when it matters most: pricing, timeline pressure, and closing.<br><br>The product is clear });

});
h+=`</div>`;
}

// ── CALL DETAIL VIEW ──
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Stage: ${det.stage} · Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;

el.innerHTML=h;
}

<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}

/* --- Google SSO Auth --- */
function decodeJwtPayload(token){
  var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join('')));
}

function handleGoogleSignIn(response){
  var payload=decodeJwtPayload(response.credential);
  var email=payload.email||'';
  if(!email.endsWith('@ocrolus.com')){
    document.getElementById('auth-error').style.display='block';
    return;
  }
  // Store session
  localStorage.setItem('ae-scorer-auth',JSON.stringify({
    email:email,
    name:payload.name||email,
    picture:payload.picture||'',
    exp:payload.exp*1000 // convert to ms
  }));
  showDashboard(email,payload.name||email,payload.picture||'');
  logAccess(email,'google_sso_login');
}

function showDashboard(email,name,picture){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('dashboard-content').style.display='block';
  var bar=document.getElementById('user-bar');
  bar.style.display='flex';
  document.getElementById('user-name').textContent=name;
  if(picture){
    document.getElementById('user-avatar').src=picture;
    document.getElementById('user-avatar').style.display='block';
  } else {
    document.getElementById('user-avatar').style.display='none';
  }
}

function signOut(){
  localStorage.removeItem('ae-scorer-auth');
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('user-bar').style.display='none';
  document.getElementById('auth-error').style.display='none';
  logAccess('','sign_out');
  // Revoke Google session
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}

// Check for existing valid session on page load
(function(){
  try{
    var saved=JSON.parse(localStorage.getItem('ae-scorer-auth'));
    if(saved && saved.email && saved.email.endsWith('@ocrolus.com') && saved.exp > Date.now()){
      showDashboard(saved.email,saved.name,saved.picture);
      logAccess(saved.email,'return_visit');
    } else if(saved){
      // Expired — clear it
      localStorage.removeItem('ae-scorer-auth');
    }
  }catch(e){
    // Legacy format or corrupted — clear
    localStorage.removeItem('ae-scorer-auth');
  }
})();
</script>
