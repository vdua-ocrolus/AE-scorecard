<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}
.card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:10px}
.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}
.fill{height:100%;border-radius:2px}
.green{color:#10b981}.blue{color:#3b82f6}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}
.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-prior{background:#3b82f6}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>

like Greenstate and Icon Mortgage ended without concrete follow-up commitments. Instead of 'I'll get back to you in a couple weeks,' try 'Let's schedule 30 minutes next Tuesday to review the updated proposal together.'","frameworkCoaching":"Your technical demonstrations are consistently strong, but the highest-scoring calls like Federal Savings Bank (7.65) had something extra - they uncovered business impact beyond just features. When Michael engaged deeply with the rep and warranty discussion, it wasn't just because you explained the technology well, but because you connected it to their real business risks. <br><br>Consider the contrast between your CME Lending demo where you delivered comprehensive technical content, versus your Members First call where you spent time understanding their evaluation process first. Both prospects were engaged, but the Members First call created clearer momentum because you understood their context before pitching solutions. <br><br>Your pipeline management is strong - multiple pricing discussions and POVs show good advancement skills. Now focus on making each conversation more prospect-centric by leading with curiosity about their world before showcasing yours. <strong>The prospects who share their challenges openly, like Alicia at Lower mentioning being 'burned before,' give you the insights needed to position Ocrolus as the clear solution.</strong>"},"kyle":{"narrative":"Strong week with 16 calls averaging 5.4/10, highlighted by an exceptional Verity partnership call (7.65) where you balanced technical depth with business discovery. Your rapport-building was consistently excellent across calls like Steadfast Mortgage and Mission Mortgage, but several demos (Hills Bank, Legacy Bank) became product-heavy presentations rather than interactive conversations.","keep":"<strong>Your authentic rapport building creates genuine connections that drive deals forward.</strong> The Omaha connection with Steadfast Mortgage and golf conversation s, as evidenced by the strong rapport across multiple calls this week. Now channel that conversational skill into business discovery. Try framing exploration questions as collaborative problem-solving: 'Help me understand your current workflow so I can show you the most relevant capabilities.' This approach will make your already strong demos even more compelling and tailored."},"charlie":{"narrative":"Strong execution week with 9 calls averaging 6.24/10, highlighted by excellent performances at Bank of Canton (7.65) and Travis Credit Union (7.25). Your ability to build rapport through conference connections and deliver compelling value demonstrations is consistently opening doors and advancing conversations.","keep":"<strong>Leverage conference connections for immediate rapport building.</strong> Your opening with Scott at Bank of Canton about the ICE conference and the UConn connection with First World created instant engagement that carried throughout those calls.","start":"<strong>Quantify business impact during discovery conversations.</strong> When Brady at Ocrolus Bank Statement mentioned growing non-QM market pressures, that was the perfect moment to ask 'How much time does manual review currently take your 9 underwriters?' to build urgency.","stop":"<strong>Settling for vague next steps when prospects are engaged.</strong> With Presidential's Michael asking detailed questions about reporting capabilities, you had clear buying signals but ended without concrete follow-up commitments or timeline clarity.","frameworkCoaching":"Your <strong>challenger teaching approach</strong> is particularly effective when you connect prospect pain points to broader market dynamics, as you did with Travis Credit Union around non-QM growth pressures. The key is layering business impact questions throughout these teaching moments - when prospects reveal operational details like 'we have 9 underwriters handling 1-2% of our volume,' that's your cue to quantify the cost of their current manual processes.<br><br>Your <strong>demo orchestration with technical teams</strong> shows real maturity, especially the smooth coordination with Stef across multiple calls. The strongest demonstrations happened when you built discovery insights first, then connected specific capabilities to previously identified pain points. Consider using those natural demo pauses when prospects ask technical questions as opportunities to circle back to business impact rather than diving deeper into features.<br><br>The pattern across your highest-scoring calls shows <strong>clear advancement with specific next steps</strong> - your POV setup with Ocrolus Bank Statement Solutions exemplifies this perfectly. When you sense strong engagement signals like Michael's detailed questions at Presidential, that's when to get crisp about decision timelines and internal processes rather than defaulting to 'we'll follow up with materials.'"},"spencer":{"narrative":"Strong week with six prospect calls averaging 5.8, highlighted by excellent rapport building across the board. Your Glacier demo (6.55) showed great team collaboration, while the Square proposal structure call (6.25) demonstrated solid strategic thinking around helping prospects build internal business cases.","keep":"<strong>Your natural rapport building continues to be a standout strength.</strong> From Josh at MAXEX commenting on your team's expertise to Holly's genuine excitement about Ocrolus capabilities at Glacier, you consistently create positive connection points that open doors for deeper conversations.","start":"<strong>Dig deeper into quantifiable business impact during discovery.</strong> While you asked about time-to-close metrics with Home Financing Center, consider exploring volume, cost per file, or error rates. When Josh mentioned manual Excel processes, that was prime territory for understanding what inefficiency costs them daily.","stop":"<strong>Leaving follow-up timelines completely in prospect hands.</strong> With Glacier, you let Holly drive next steps entirely, and with Square you accepted 'next week' without specifics. Try asking what needs to happen this week to move forward, or what day works best for a follow-up rather than open-ended scheduling.","frameworkCoaching":"Your discovery conversations show real promise, particularly in understanding current state challenges, but there's an opportunity to strengthen your value quantification before moving to solutions. With MAXEX, Josh described manual Excel processes as a 'slow moving train' — that phrase signals both pain and inertia, making it the perfect moment to explore what inefficiency costs them and what could accelerate change. The strongest deals emerge when prospects can articulate clear business impact, not just process improvement.<br><br>Your advancement skills vary significantly depending on how much control you maintain in the conversation flow. The Square call demonstrated excellent strategic thinking when you helped them build their business case for Andrea, but consider being more specific about mutual commitments. Instead of accepting 'next week' for deliverables, try asking what specifically needs to happen by Friday to keep momentum. This approach transforms vague timelines into concrete next steps that both parties can commit to."}}},{"weekOf":"2026-04-06","weekLabel":"Apr 6 – Apr 10, 2026","reps":[{"id":"sam","name":"Sam Loomis","title":"Enterprise AE","profile":"Problem Solver","avg":5.95,"n":16},{"id":"kyle","name":"Kyle Swikoski","title":"Dir. Strategic Sales","profile":"Problem Solver","avg":6.22,"n":8},{"id":"charlie","name":"Charlie Allen","title":"Enterprise AE","profile":"Relationship Builder","avg":5.57,"n":7},{"id":"spencer","name":"Spencer Sobczak","title":"Account Executive","profile":"Problem Solver","avg":6.24,"n":7}],"calls":[{"id":1,"rep":"sam","title":"My City Home Loan X Ocrolus - Conditioning","prospect":"Multiple stakeholders","date":"Mon 4/6","dur":"32m","type":"POV // Build cumulative MEDDPICC for a call by scanning all prior calls with same account
function getCumMeddpicc(call){
if(call.mc)return call.mc;
// Resolve account: prefer stored acct/dom fields, fall back to title parsing
let acct=call.acct||null;
const dom=call.dom||null;
if(!acct){
const parts=call.title.split(/\s*(?:<>|\+|[xX](?=\s)|\||\/)\s*/).map(s=>s.trim()).filter(Boolean);
for(const p of parts){if(!p.toLowerCase().includes("ocrolus")&&p.length>1){const cl=p.replace(/\s*\(.*\)\s*/g,"").replace(/\s*[—–-]\s*.*/g,"").replace(/\s*(POV|Demo|Pricing|Sync|Review|Kickoff|Contract|Proposal|Discussion|Debrief|Planning|Test-Drive|Test|Tutorial|Conditions|Summary|ROI|Evaluation|Results|Weekly|Automated|Encompass|Discovery|Tech|AI|Architecture|Next Steps|Final Alignment|Approval|Refresher).*$/i,"").trim();if(cl.length>1){acct=cl;break}}}
}
if(!acct&&!dom)return call.m;
const al=acct?acct.toLowerCase():null;
const db=dom?dom.split(".")[0].toLowerCase():null;
function isMatch(c){
if(dom&&c.dom&&c.dom===dom)return true;
if(al&&c.acct&&c.acct.toLowerCase()===al)return true;
if(db&&c.title&&c.title.toLowerCase().includes(db))return true;
if(al&&c.title&&c.title.toLowerCase().includes(al))return true;
if(c.dom&&al){const ob=c.dom.split(".")[0].toLowerCase();if(al.includes(ob)||ob.includes(al))return true}
return false;
}
const cum={M:0,E:0,DC:0,DP:0,IP:0,Ch:0,Co:0};
const allHist=[...weeklyHistory];
for(const w of allHist){if(!w.calls)continue;for(const c of w.calls){if(c.rep===call.rep&&c.date!==call.date&&isMatch(c)){MK.forEach(k=>{if(c.m&&c.m[k])cum[k]=1})}}}
for(const c of calls){if(c.rep===call.rep&&c.id!==call.id&&c.id<call.id&&isMatch(c)){MK.forEach(k=>{if(c.m&&c.m[k])cum[k]=1})}}
MK.forEach(k=>{if(call.m&&call.m[k])cum[k]=1});
return cum;
}

<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}

/* --- Google SSO Auth --- */
function decodeJwtPayload(token){
  var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join('')));
}

function handleGoogleSignIn(response){
  var payload=decodeJwtPayload(response.credential);
  var email=payload.email||'';
  if(!email.endsWith('@ocrolus.com')){
    document.getElementById('auth-error').style.display='block';
    return;
  }
  // Store session
  localStorage.setItem('ae-scorer-auth',JSON.stringify({
    email:email,
    name:payload.name||email,
    picture:payload.picture||'',
    exp:payload.exp*1000 // convert to ms
  }));
  showDashboard(email,payload.name||email,payload.picture||'');
  logAccess(email,'google_sso_login');
}

function showDashboard(email,name,picture){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('dashboard-content').style.display='block';
  var bar=document.getElementById('user-bar');
  bar.style.display='flex';
  document.getElementById('user-name').textContent=name;
  if(picture){
    document.getElementById('user-avatar').src=picture;
    document.getElementById('user-avatar').style.display='block';
  } else {
    document.getElementById('user-avatar').style.display='none';
  }
}

function signOut(){
  localStorage.removeItem('ae-scorer-auth');
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('user-bar').style.display='none';
  document.getElementById('auth-error').style.display='none';
  logAccess('','sign_out');
  // Revoke Google session
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}

// Check for existing valid session on page load
(function(){
  try{
    var saved=JSON.parse(localStorage.getItem('ae-scorer-auth'));
    if(saved && saved.email && saved.email.endsWith('@ocrolus.com') && saved.exp > Date.now()){
      showDashboard(saved.email,saved.name,saved.picture);
      logAccess(saved.email,'return_visit');
    } else if(saved){
      // Expired — clear it
      localStorage.removeItem('ae-scorer-auth');
    }
  }catch(e){
    // Legacy format or corrupted — clear
    localStorage.removeItem('ae-scorer-auth');
  }
})();
</script>
