<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:#0a0f1a;color:#e2e8f0;padding:24px 20px;max-width:960px;margin:0 auto}
.mono{font-family:'IBM Plex Mono',monospace}
.tag{font-size:9px;padding:2px 6px;border-radius:3px;font-weight:500;letter-spacing:.5px}
.card{background:#111827;border:1px solid #1e293b;border-radius:8px;padding:16px;margin-bottom:10px}
.bar{height:4px;background:#1e293b;border-radius:2px;overflow:hidden;width:90px}
.fill{height:100%;border-radius:2px}
.green{color:#10b981}.blue{color:#3b82f6}.amber{color:#f59e0b}.red{color:#ef4444}.purple{color:#8b5cf6}
.bg-green{background:#10b981}.bg-blue{background:#3b82f6}.bg-amber{background:#f59e0b}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot-on{background:#10b981}.dot-off{background:#334155}
button{cursor:pointer;font-family:inherit;border:none;outline:none}
.tab{padding:8px 16px;border-radius:7px;background:transparent;border:1px solid #1e293b;text-align:left;transition:all .15s}
.tab.active{border-color:#3b82f6;background:#1e293b}
.tab .name{font-size:13px;font-weight:600}.tab .sub{font-size:10px;color:#475569}
.vtab{padding:4px 10px;font-size:10px;border-radius:4px;border:1px solid #1e293b;background:transparent;color:#475569;text-transform:uppercase;letter-spacing:.5px}
.vtab.active{border-color:#3b82f6;background:#1e293b;color:#93c5fd}
.call-row{border-left:3px solid;padding:10px 14px;cursor:pointer;transition:background .15s}
.call-row:hover{background:#1e293b}
a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}
th,td{padding:6px 8px;border-bottom:1px solid #1e293b;font-size:11px}
th{color:#475569;font-weight:500;text-align:left}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:16px}
.kpi{padding:12px 14px}.kpi .label{font-size:10px;color:#475569;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
.coaching-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.strength{padding-left:8px;border-left:2px solid #10b981;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.opp{padding-left:8px;border-left:2px solid #f59e0b;margin-bottom:5px;font-size:11px;color:#94a3b8;line-height:1.5}
.trend-bar{display:flex;align-items:end;gap:3px;height:40px}
.trend-col{width:12px;border-radius:2px 2px 0 0;transition:height .3s}
.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}
</style>

itle":"Dir. Strategic Sales","profile":"Deal Closer","avg":7.69,"n":4},{"id":"charlie","name":"Charlie Allen","title":"Enterprise AE","profile":"Account Grower","avg":7.6,"n":2},{"id":"spencer","name":"Spencer Sobczak","title":"Account Executive","profile":"Technical Advisor","avg":7.03,"n":2}],"calls":[{"id":1,"rep":"sam","title":"Thompson Kane Demo","prospect":"John (Owner), Austin (Ops)","date":"Fri 3/20","dur":"61m","type":"Full Demo","stage":"Evaluation","s":{"r":8,"d":6,"v":7,"a":8,"c":7,"e":8},"w":7.15,"tr":46,"m":{"M":1,"E":0,"DC":0,"DP":0,"IP":1,"Ch":0,"Co":0},"str":["John articulated 30-50% capacity lift without prompting","Austin validated front-end efficiency for processors","Tuesday ROI review and follow-up booked on-call"],"opp":["Probe Economic Buyer and decision process before pricing","Reduce SE talk dominance — AE must own the room"],"q":"If our capacity goes up 30 to 50 percent with this, I mean, we could grow a lot without hiring more people.","coach":"John volunteering a 30-50% capacity argument before the pricing conversation even started is the highest-quality buying signal a rep can receive. That is Gap Selling executing at its best — the prospect articulating the future state value in their own language. The groundwork that got John to that moment was real.<br><br>The strategic gap is what happened after John said it. That sentence deserved an immediate response: 'John, if we achieve that lift — what does that actually mean in dollar terms for Thompson Kane this year?' One question. It turns a powerful moment into a quantified business case that John now owns and will carry into the contract conversation. Without quantification, that moment evaporates.<br><br>Austin's engagement was a strong signal that was also underutilized. Austin was asking about rental property workflows, Encompass integration, and front-end efficiency gains — he is a potential internal champion. After the call, a direct outreach to Austin: 'Austin, you had great questions about the Encompass workflows — would a 20-minute focused session be useful for your team?' creates a second thread into the account.<br><br>On MEDDPICC: the Economic Buyer and Decision Process remain unidentified on a call that reached pricing. John 'letting Austin in' mid-call suggests John is the decision-maker, but that assumption needs to be validated. 'John, when you decide to move forward on a tool like this, who else is typically part of that conversation?' is a natural close question that unlocks the path to signature.","prep":["Ask John to quantify the capacity lift in dollar terms","Reach out to Austin directly for a focused Encompass workflow deep-dive","Ask about the decision process: who else is involved?","Probe competitive landscape before Tuesday","Build a preliminary ROI model using their team size and estimated file volume"],"url":"https://us-29990.app.gong.io/call?id=4567477048525966914"},{"id":2,"rep":"sam","title":"HMA Pricing","prospect":"Amy, Andrew (HMA)","date":"Mon 3/16","dur":"31m","type":"Pricing","stage":"Late Eval","s":{"r":8,"d":7,"v":8,"a":8,"c":7,"e":7},"w":7.45,"tr":75,"m":{"M":1,"E":0,"DC":1,"DP":1,"IP":0,"Ch":1,"Co":0},"str":["ROI calculator ready — walked through per-processor/UW economics","Offered success-based pricing structure for flexibility","Monday follow-up with product head Becca booked on-call"],"opp":["75% rep talk ratio too high even for pricing call","Partner approval path not mapped before close"],"q":"When you get done hobnobbing down there in vegas, let me know, let's get back on the phone and walk through that.","coach":"Arriving at a pricing call from ICE with an ROI calculator and a success-based pricing alternative is exactly the preparation this stage demands. Andrew's positive reaction confirms the flexibility framing landed. Monday 10am with Becca and the HMA team is a strong, specific next step.<br><br>The critical data point: 75% rep talk ratio on a pricing call. At the pricing stage, the prospect should be doing the math out loud — not listening. That question, asked three or four times throughout the ROI walkthrough, creates the conversation that builds internal commitment.<br><br>The partner approval element was mentioned but not mapped. Amy referenced partners needing to weigh in, and Sam moved past it. The Voss play here is an accusation audit: 'You're probably thinking the partner approval process is going to slow this down.' Saying the scary thing out loud forces Amy to either confirm or disconfirm.<br><br>For MEDDPICC: Metrics (ROI calc) and Decision Process (partner approval) are touched. The Economic Buyer remains unidentified — who at HMA actually signs?","prep":["Ask: who at HMA approves a contract of this size?","Run an accusation audit on the partner approval","Prepare ROI scenarios in 3 tiers for the Becca call","Confirm March end-of-month pricing deadline creates urgency","Map competitive alternatives"],"url":"https://us-29990.app.gong.io/call?id=9085529724274902861"},{"id":3,"rep":"sam","title":"Superior Natl Bank POV","prospect":"Denise, Nicole","date":"Wed 3/19","dur":"31m","type":"POV Check-in","stage":"Testing","s":{"r":5,"d":5,"v":6,"a":6,"c":4,"e":7},"w":5.55,"tr":3,"m":{"M":0,"E":0,"DC":0,"DP":1,"IP":1,"Ch":1,"Co":0},"str":["Denise and Nicole highly engaged with SE Steph throughout","Tomorrow's meeting prep identified as key priority","Product accuracy validated by the team"],"opp":["AE arrived late and contributed 42 words in 31 minutes","SE carried the entire call — AE-prospect relationship at risk"],"q":"I really can't say enough about how pleasant of an experience this has been even through some hiccups.","coach":"This was Steph's call, not Sam's. The 42-word contribution on a 31-minute call is the single largest coaching issue this week. The risk is structural, not cosmetic. When the SE owns the relationship, the AE loses leverage at the table when it matters most: pricing, timeline pressure, and closing.<br><br>The product is clear <script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}

/* --- Google SSO Auth --- */
function decodeJwtPayload(token){
  var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join('')));
}

function handleGoogleSignIn(response){
  var payload=decodeJwtPayload(response.credential);
  var email=payload.email||'';
  if(!email.endsWith('@ocrolus.com')){
    document.getElementById('auth-error').style.display='block';
    return;
  }
  // Store session
  localStorage.setItem('ae-scorer-auth',JSON.stringify({
    email:email,
    name:payload.name||email,
    picture:payload.picture||'',
    exp:payload.exp*1000 // convert to ms
  }));
  showDashboard(email,payload.name||email,payload.picture||'');
  logAccess(email,'google_sso_login');
}

function showDashboard(email,name,picture){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('dashboard-content').style.display='block';
  var bar=document.getElementById('user-bar');
  bar.style.display='flex';
  document.getElementById('user-name').textContent=name;
  if(picture){
    document.getElementById('user-avatar').src=picture;
    document.getElementById('user-avatar').style.display='block';
  } else {
    document.getElementById('user-avatar').style.display='none';
  }
}

function signOut(){
  localStorage.removeItem('ae-scorer-auth');
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('user-bar').style.display='none';
  document.getElementById('auth-error').style.display='none';
  logAccess('','sign_out');
  // Revoke Google session
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}

// Check for existing valid session on page load
(function(){
  try{
    var saved=JSON.parse(localStorage.getItem('ae-scorer-auth'));
    if(saved && saved.email && saved.email.endsWith('@ocrolus.com') && saved.exp > Date.now()){
      showDashboard(saved.email,saved.name,saved.picture);
      logAccess(saved.email,'return_visit');
    } else if(saved){
      // Expired — clear it
      localStorage.removeItem('ae-scorer-auth');
    }
  }catch(e){
    // Legacy format or corrupted — clear
    localStorage.removeItem('ae-scorer-auth');
  }
})();
</script>
