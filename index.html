<script>
const reps=[

];
const MK=["M","E","DC","DP","IP","Ch","Co"];

const calls=[
{id:1,rep:"sam",title:"Thompson Kane Demo",prospect:"John (Owner), Austin (Ops)",date:"Fri 3/20",dur:"61m",type:"Full Demo",stage:"Evaluation",s:{r:8,d:6,v:7,a:8,c:7,e:8},w:7.15,tr:46,m:{M:1,E:0,DC:0,DP:0,IP:1,Ch:0,Co:0},str:["John articulated 30-50% capacity lift without prompting","Austin validated front-end efficiency for processors","Tuesday ROI review and follow-up booked on-call"],opp:["Probe Economic Buyer and decision process before pricing","Reduce SE talk dominance — AE must own the room"],q:"If our capacity goes up 30 to 50 percent with this, I mean, we could grow a lot without hiring more people.",coach:"John volunteering a 30-50% capacity argument before the pricing conversation even started is the highest-quality buying signal a rep can receive. That is Gap Selling executing at its best — the prospect articulating the future state value in their own language. The groundwork that got John to that moment was real.<br><br>The strategic gap is what happened after John said it. That sentence deserved an immediate response: 'John, if we achieve that lift — what does that actually mean in dollar terms for Thompson Kane this year?' One question. It turns a powerful moment into a quantified business case that John now owns and will carry into the contract conversation. Without quantification, that moment evaporates.<br><br>Austin's engagement was a strong signal that was also underutilized. Austin was asking about rental property workflows, Encompass integration, and front-end efficiency gains — he is a potential internal champion. After the call, a direct outreach to Austin: 'Austin, you had great questions about the Encompass workflows — would a 20-minute focused session be useful for your team?' creates a second thread into the account.<br><br>On MEDDPICC: the Economic Buyer and Decision Process remain unidentified on a call that reached pricing. John 'letting Austin in' mid-call suggests John is the decision-maker, but that assumption needs to be validated. 'John, when you decide to move forward on a tool like this, who else is typically part of that conversation?' is a natural close question that unlocks the path to signature.",prep:["Ask John to quantify the capacity lift in dollar terms — what does 30-50% mean for their annual volume?","Reach out to Austin directly for a focused Encompass workflow deep-dive","Ask about the decision process: who else is involved when Thompson Kane commits to a technology partner?","Probe competitive landscape before Tuesday: 'Are you evaluating any other tools alongside us?'","Build a preliminary ROI model using their team size and estimated file volume before the Tuesday meeting"],url:"https://us-29990.app.gong.io/call?id=4567477048525966914"},
{id:2,rep:"sam",title:"HMA Pricing",prospect:"Amy, Andrew (HMA)",date:"Mon 3/16",dur:"31m",type:"Pricing",stage:"Late Eval",s:{r:8,d:7,v:8,a:8,c:7,e:7},w:7.45,tr:75,m:{M:1,E:0,DC:1,DP:1,IP:0,Ch:1,Co:0},str:["ROI calculator ready — walked through per-processor/UW economics","Offered success-based pricing structure for flexibility","Monday follow-up with product head Becca booked on-call"],opp:["75% rep talk ratio too high even for pricing call","Partner approval path not mapped before close"],q:"When you get done hobnobbing down there in vegas, let me know, let's get back on the phone and walk through that.",coach:"Arriving at a pricing call from ICE with an ROI calculator and a success-based pricing alternative is exactly the preparation this stage demands. Andrew's positive reaction ('that's great flexibility, thanks') confirms the flexibility framing landed. Monday 10am with Becca and the HMA team is a strong, specific next step.<br><br>The critical data point: 75% rep talk ratio on a pricing call. This is a structural tell. At the pricing stage, the prospect should be doing the math out loud — not listening. When Sam asked 'how does this compare to what you had in mind?' that was the right instinct, but it came once and briefly. That question, asked three or four times throughout the ROI walkthrough, creates the conversation that builds internal commitment.<br><br>The partner approval element was mentioned but not mapped. Amy referenced partners needing to weigh in, and Sam moved past it. The Voss play here is an accusation audit: 'You're probably thinking the partner approval process is going to slow this down.' Saying the scary thing out loud forces Amy to either confirm (and then you can help remove the obstacle) or disconfirm (and now you know the path is clear). Either answer is more valuable than not asking.<br><br>For MEDDPICC: Metrics (ROI calc) and Decision Process (partner approval) are touched. The Economic Buyer remains unidentified — who at HMA actually signs?",prep:["Ask: who at HMA approves a contract of this size — is it Amy, Andrew, or someone above them?","Run an accusation audit on the partner approval: address it proactively on Monday","Prepare ROI scenarios in 3 tiers (conservative, mid, optimistic) for the Becca call","Confirm March end-of-month pricing deadline creates urgency for HMA","Map competitive alternatives: 'What else has your team looked at?'"],url:"https://us-29990.app.gong.io/call?id=9085529724274902861"},
{id:3,rep:"sam",title:"Superior Natl Bank POV",prospect:"Denise, Nicole",date:"Wed 3/19",dur:"31m",type:"POV Check-in",stage:"Testing",s:{r:5,d:5,v:6,a:6,c:4,e:7},w:5.55,tr:3,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:1,Co:0},str:["Denise and Nicole highly engaged with SE Steph throughout","Tomorrow's meeting prep identified as key priority","Product accuracy validated by the team"],opp:["AE arrived late and contributed 42 words in 31 minutes","SE carried the entire call — AE-prospect relationship at risk"],q:"I really can't say enough about how pleasant of an experience this has been even through some hiccups.",coach:"This was Steph's call, not Sam's. The 42-word contribution on a 31-minute call is the single largest coaching issue this week. Denise thanked Steph by name for answering their questions. Sam apologized for tardiness. That is the signature on the call — and it is the wrong signature.<br><br>The risk is structural, not cosmetic. When the SE owns the relationship, the AE loses leverage at the table when it matters most: pricing, timeline pressure, and closing. Denise and Nicole are preparing for tomorrow's group meeting. If Sam had been present for this call, there was an opportunity to ask: 'Denise, when you present this to the group tomorrow — what questions do you think they'll raise? Let me help you prepare.' That question turns a POV check-in into a coaching session that cements the AE as the deal owner.<br><br>The product is clearly working — Denise praised the accuracy and the team's responsiveness. That goodwill exists despite Sam's absence. The question is how much longer it will before Denise starts wondering why she doesn't hear more from the AE on a deal this far along.",prep:["Send Denise and Nicole a personal follow-up today — own the relationship, not just the deal","Ask Denise: 'What questions do you expect from the group tomorrow? Let me help you prepare answers'","Schedule a 30-minute readout call for after tomorrow's meeting — be the first call they make","Map the Economic Buyer: who in the group meeting approves the contract?","Establish a direct Slack or text relationship with Nicole as the internal champion"],url:"https://us-29990.app.gong.io/call?id=731956092145352767"},
{id:4,rep:"kyle",title:"Mission Mortgage POV",prospect:"Leslie (Ops Lead)",date:"Fri 3/20",dur:"49m",type:"POV Test-Drive",stage:"Active Eval",s:{r:8,d:8,v:7,a:8,c:8,e:9},w:8.00,tr:39,m:{M:0,E:0,DC:1,DP:0,IP:1,Ch:1,Co:0},str:["Leslie uploading real files live — highest engagement signal in a POV","Kyle probed bank statement loan complexity and Encompass friction in real-time","Tuesday 11am follow-up booked before ending the call"],opp:["No Metrics established — volume, cost, hours not quantified","Economic Buyer not surfaced despite active evaluation stage"],q:"I'd love to see how this stacks up.",coach:"Leslie uploading files during a live call is the best POV engagement signal available from a transcript. She is not evaluating — she is testing to buy. The 38.5% balanced talk ratio reflects genuine co-discovery, not a rep monologue. Meeting her at a conference and converting to an active POV is clean deal execution.<br><br>The quantification gap is the same across all four of Kyle's calls this week: the prospect's problem is identified but not costed. Leslie mentioned they're getting into fully automated decisioning and that per-file pricing is cost prohibitive on leads without a contract. That is a buying constraint with a dollar value attached. 'Leslie, if you eliminate that per-file friction and process all leads through the same workflow — how many additional loans would you close in a month?' is one sentence. It converts an operational pain into a business case that survives the internal approval process.<br><br>The Economic Buyer remains unidentified at active-evaluation stage. Tuesday is the right moment: 'Leslie, as we move toward a proposal — who else on your side needs to be part of that conversation?' The answer tells you whether Tuesday is a decision call or a checkpoint call.",prep:["Quantify the bank statement loan opportunity: how many per month, what is the current review time?","Ask Tuesday: 'Who else needs to be involved as we move toward a proposal?'","Prepare a tailored ROI model using Mission's volume and current processing costs","Probe competitive alternatives: are they evaluating any other tools?","Confirm whether Leslie has budget authority or needs additional approvals"],url:"https://us-29990.app.gong.io/call?id=5497768588641858238"},
{id:5,rep:"kyle",title:"TexasBank Proposal",prospect:"Brandon (Champion), John",date:"Fri 3/20",dur:"22m",type:"Proposal Review",stage:"Late Stage",s:{r:8,d:7,v:8,a:9,c:8,e:8},w:7.90,tr:73,m:{M:1,E:1,DC:1,DP:1,IP:0,Ch:1,Co:0},str:["Brandon internally politicking — 'I have a price, I have a contract'","Month-end coupon deployed with natural urgency","Thursday March 26 booked after board meeting — specific and time-bound"],opp:["Competition not probed despite late-stage position","72.9% rep talk for a proposal call — let Brandon close himself"],q:"I have a price, I have a contract. I'm going to approach it as — I'm at the point of presenting.",coach:"Brandon is doing the selling for you. 'I have a price, I have a contract' and 'I've already had discussions with the big wigs' from a champion mid-call is exceptional. He is actively navigating the internal approval process in real-time on the call. The Thursday March 26 next step, keyed to the board meeting, is precisely the right structure for a deal at this stage.<br><br>The month-end coupon deployed cleanly — Brandon understood the urgency mechanism and it shaped his behavior immediately. That is disciplined commercial management.<br><br>The competition gap is the one risk on a late-stage deal: Kyle did not ask. At pricing with a board meeting on March 26, an unknown competitive alternative changes the entire strategy. One question — 'Brandon, at this stage, are you evaluating any other solutions alongside us?' — takes 10 seconds and tells you whether you're in a race or a formality. Not asking on a deal this close is the only flag.<br><br>The talk ratio at 72.9% is contextually appropriate for a proposal walkthrough, but on the sections where Brandon volunteered internal intel, the better play is silence — let him keep going. Every sentence Brandon speaks about internal politicking is intelligence.",prep:["Send the contracting packet before Brandon's Monday preparation for the board","Ask: 'Brandon, is there anything the board might push back on? I can help you frame the response'","Check: 'Are you evaluating any other solutions? I want to make sure we are differentiated clearly'","Confirm the vendor questionnaire timeline and any legal/security review requirements","Have a ROI one-pager ready for the board — they will look at total contract value, not just annual cost"],url:"https://us-29990.app.gong.io/call?id=5063342530324561299"},
{id:6,rep:"kyle",title:"Gulf Coast Bank POV",prospect:"Benny, Cathy (Ops)",date:"Fri 3/20",dur:"43m",type:"POV Test-Drive",stage:"Active Eval",s:{r:8,d:7,v:7,a:5,c:6,e:8},w:6.75,tr:54,m:{M:0,E:0,DC:1,DP:0,IP:1,Ch:0,Co:0},str:["Active file testing — Cathy and Benny engaged throughout","Income discrepancy analysis demonstrated effectively","Implementation fee waiver on 3-year term positioned well"],opp:["No booked next step — 'I'll send you an email' is deal momentum at rest","Champion not identified — Benny or Cathy? Neither was named"],q:"Sorry Steph, we're driving you all over the place — you're doing great though.",coach:"The technical session went well. Cathy and Benny were actively engaged with real files, asking diagnostic questions, and the SE's walkthrough of the income discrepancy resolution was strong. The implementation fee waiver on 3-year term was the right commercial lever to introduce here.<br><br>The close was the problem. 'We'll talk about it and get back to you' with no booked meeting is a POV that stops moving. Kyle's question — 'should we put together a proposal or schedule more testing?' — was exactly the right binary choice. But accepting the passive answer without anchoring a date left the deal with no next step.<br><br>The Voss play here is a label: 'It sounds like you want a bit more time before committing to a proposal.' If Benny confirms, you ask: 'What would make you feel ready? Is it more files, a specific question answered, or just time to discuss internally?' Now the prospect tells you exactly what it takes to advance. If they disconfirm, they're more ready than they let on — and you book Tuesday right then.<br><br>Champion identification is also unresolved. Benny and Cathy are both engaged, but neither has been named as the internal driver. 'Benny, as you and Cathy discuss — who on your side would typically own a decision like this?' is the question that tells you who to run the close through.",prep:["Send the follow-up email today with a specific proposed date: 'Does Tuesday March 24 at 2pm work for a 30-min debrief?'","Label the stall in the email: 'It sounds like you want more time to discuss internally — happy to give you space, but let's keep a placeholder so we don't lose momentum'","Identify champion: Benny or Cathy — who needs to own the internal conversation?","Prepare a one-page proposal summary Benny can share internally","Leave test environment open and ask them to test 5 specific file types before Tuesday"],url:"https://us-29990.app.gong.io/call?id=7558276993123292451"},
{id:7,rep:"kyle",title:"Covius POV Test-Drive",prospect:"Dustin (Champion)",date:"Fri 3/20",dur:"41m",type:"POV / Discovery",stage:"Active Eval",s:{r:9,d:8,v:7,a:8,c:8,e:9},w:8.10,tr:56,m:{M:1,E:0,DC:1,DP:1,IP:1,Ch:1,Co:1},str:["Dustin revealed 2-vendor onboarding plan — Kyle handled competitive intel perfectly","Kyle restructured proposal in real-time after learning actual document scope","Next Friday POC execution booked — clear and time-bound"],opp:["Economic Buyer not identified despite POC agreement stage","Value quantification missing — no metrics attached to their extraction pain"],q:"We're going to onboard more than one vendor here, probably two.",coach:"The Covius call is the highest-quality call across all four reps this week. The rapport sequence in the opener was exceptional — Dustin saying 'dream team, double coverage' and the ICE conversation built immediate comfort. When Dustin revealed they're onboarding two vendors, Kyle's response was flawless: he extracted the evaluation criteria, restructured the proposal in real-time, and moved directly to next steps. That is Challenger Sale 'take control' in its most precise form.<br><br>The competitive intel Dustin gave was extraordinary: two vendors, CCO involvement possible, legal entities meeting. Every word of that is intelligence. Kyle correctly harvested it by staying curious and not pressing defensively.<br><br>The Economic Buyer gap is the one risk on a deal this close to POC execution. Dustin mentioned CCO involvement — that means the CCO is likely the economic buyer. 'Dustin, is it worth getting the CCO on the next call directly?' is a 10-second question that either accelerates the deal or reveals a political constraint Kyle needs to navigate.<br><br>On Metrics: Covius extracts data from 12-13 core documents. The quantification question is simple: 'Dustin, what does it cost your team today to manually scrape those 750 pages? What is the labor input?' If Dustin knows that number, it becomes the ROI anchor for the proposal.",prep:["Send SFTP instructions today so Covius can prepare for the POC execution","Ask Dustin: 'Should the CCO be part of next Friday's call given the scope of the agreement?'","Ask Dustin: 'What does it cost your team today to manually process those 750 pages of documents per file?'","Build the restructured proposal based on 12-13 core docs, not full file extraction","Research Covius's compliance requirements before the POC — their proprietary compliance engine creates specific integration requirements"],url:"https://us-29990.app.gong.io/call?id=5518831982071398054"},
{id:8,rep:"charlie",title:"Traditions Demo (Encompass)",prospect:"Brad (Ops Lead), Dan (Finance)",date:"Wed 3/19",dur:"68m",type:"Full Demo",stage:"Evaluation",s:{r:8,d:7,v:8,a:6,c:7,e:9},w:7.35,tr:34,m:{M:1,E:0,DC:0,DP:1,IP:1,Ch:1,Co:0},str:["68-minute fully engaged demo — Brad and Dan both asked deep technical questions","Brad volunteered for trial/test environment — unprompted buying signal","Crawl-walk-run framing resonated with both contacts"],opp:["No next step booked — Brad said 'I'll circle back' and Charlie accepted it","Ownership group not mapped despite two explicit mentions"],q:"I'd love to do that — if it's a true test, 15 days with no obligation.",coach:"Sixty-eight minutes of genuine engagement is a real signal. Brad asking about FHA overtime requirements, Dan probing multiple-employer income stability, both staying through a full demo — that is a prospect team that has done internal homework before this call. The crawl-walk-run positioning was exactly right for a lean ops team nearing capacity.<br><br>The missed moment is the close. Dan said he had a hard stop at 11. That was the signal: pivot to Brad alone. 'Brad, before Dan has to drop — let's just put 30 minutes on the calendar for next week. Does Tuesday at 2 work?' One sentence. Anchors a date while Dan is still on the call, which creates social accountability for Brad to follow through.<br><br>The ownership group was mentioned twice and Charlie never asked about it. 'Brad, when you and Dan present this to the ownership group — how many people is that, and when do they typically meet?' is the single most important question that wasn't asked. Without knowing who is in that room and what they'll ask, there is no way to arm Brad for the close. That group controls the signature, and Charlie has no visibility into it.<br><br>Use the trial/test environment as the close mechanism: 'Brad, let's get you into the test environment next week — 15 days, no obligation, just like you described. I'll set up the invite with the trial access details. Does Thursday work?'",prep:["Follow up today with the trial/test environment invite — make it concrete, not a maybe","Ask Brad: who is in the ownership group, when do they meet, and what questions will they have?","Prepare an ROI summary Brad and Dan can present to the ownership group","Ask Brad's current state pain in dollar terms: what does manual processing cost them per month?","Confirm: when Brad says 'I'd love to do that' — book Thursday explicitly, not open-ended"],url:"https://us-29990.app.gong.io/call?id=2913166878070026346"},
{id:9,rep:"charlie",title:"First World POV Kickoff",prospect:"Sean, Suzanne, Ryan, Felix",date:"Fri 3/20",dur:"32m",type:"POV Kickoff",stage:"Active Eval",s:{r:8,d:8,v:7,a:8,c:8,e:8},w:7.85,tr:44,m:{M:0,E:0,DC:0,DP:1,IP:1,Ch:1,Co:1},str:["Multi-stakeholder POV kickoff — 4 First World team members present","15-file target and Thursday March 26 review booked cleanly","DeepHaven delegated underwriting pain surfaced — DSCR and non-QM context","Sean's prior relationship drove strong early engagement"],opp:["No Metrics established — neither volume nor cost-per-file quantified","Economic Buyer not identified across a 4-person stakeholder team"],q:"I like that.",coach:"This is the POV execution template. Four stakeholders present, clear expectations set (15 files, trailing docs workflow, Thursday March 26 review), and DeepHaven's friction as the competitive context. When Sean mentioned they're exploring fully delegated underwriting with DeepHaven, Charlie asked a sharp follow-up question — that is exactly the kind of competitive intelligence that shapes the POV strategy.<br><br>The technical section on audit trail and trailing docs was well-executed. Suzanne asking about file routing and Ryan engaging on document classification means the team is genuinely evaluating, not just observing.<br><br>The Metrics and Economic Buyer gaps are consistent across all of Charlie's calls this week and last. On a kickoff with four stakeholders, the right question before setting POV expectations is: 'Sean, as you go through the test — who is going to be reviewing the results with you, and who makes the final call?' That question maps MEDDPICC elements in a single sentence. With four people on the call, there is clearly an internal decision hierarchy — identify it now, not after the POV is complete.<br><br>Thursday March 26 is a strong commitment. The POV structure is solid. The path to close runs through quantifying the value before the Thursday readout.",prep:["Send POV access credentials and file upload instructions today","Prepare a POV scorecard template for Sean and team — track specific outcomes across 15 files","Ask Sean Thursday: 'What was the most surprising result from the files you tested?'","Ask the Economic Buyer question Thursday: 'Sean, as we think about moving forward — who else needs to be part of that conversation?'","Quantify the DSCR/non-QM volume: how many files per month, current review time, and where is the highest friction?"],url:"https://us-29990.app.gong.io/call?id=4696960713123925237"},
{id:10,rep:"spencer",title:"Patriot Home Mortgage Demo",prospect:"Leanne (Ops), Matt (Owner)",date:"Mon 3/17",dur:"43m",type:"Demo",stage:"Evaluation",s:{r:8,d:8,v:7,a:7,c:7,e:8},w:7.55,tr:46,m:{M:1,E:0,DC:0,DP:1,IP:1,Ch:1,Co:1},str:["Leanne surfaced LoanBeam replacement opportunity — unprompted buying signal","Non-QM volume increase identified as primary driver","Follow-up booked for next day and SE Steph aligned on conditions product"],opp:["Economic Buyer (Matt) stayed mostly passive — not engaged during demo","SE handled most technical depth — Spencer needs to own more of the product narrative"],q:"I'm assuming that I would be able to get rid of loanbeam if we were to move forward with ocrolus?",coach:"Leanne's LoanBeam question is the best sentence on any of Spencer's calls this week. She is not asking about the product — she is figuring out the consolidation story she needs to tell internally. That question tells you the internal business case is already forming: 'we replace LoanBeam and get everything in one place.' Spencer should have amplified it: 'Leanne, that's exactly the play — what does LoanBeam cost you annually? If we can replace that and add the non-QM automation on top, the math gets very clear very quickly.' Let her do that calculation out loud.<br><br>Matt was on the call but quiet. A CEO/owner who is passive during a demo is either disengaged or observing — and Spencer never asked a direct question to draw him out. 'Matt, given what you're seeing — does this match what you were hoping to accomplish when you re-engaged with us?' One question. Forces a response that either confirms alignment or reveals a hidden objection.<br><br>The non-QM volume increase is the strategic pain point for this deal. One manual reviewer processing an increasing volume of non-QM files is a capacity ceiling that is approaching fast. Spencer identified it but didn't quantify it. 'How many non-QM files do you process per month today, and where does your one reviewer get stuck most often?' gets the number that builds the ROI case for the proposal call.",prep:["Ask Leanne: what does LoanBeam cost annually — build the replacement case in dollars","Draw Matt into the conversation on the proposal call — ask him a direct question in the first 5 minutes","Quantify non-QM pain: how many files per month, how long does the one reviewer spend?","Prepare a side-by-side showing LoanBeam displacement + non-QM automation in one proposal","Ask: who needs to approve a contract of this size — is it Matt, or does it go to the ownership group?"],url:"https://us-29990.app.gong.io/call?id=930688166204165085"},
{id:11,rep:"spencer",title:"Patriot Proposal Review",prospect:"Matt (Owner), Leanne, Shelly (IT)",date:"Tue 3/18",dur:"31m",type:"Proposal",stage:"Late Stage",s:{r:7,d:5,v:8,a:8,c:6,e:6},w:6.50,tr:84,m:{M:1,E:1,DC:1,DP:1,IP:0,Ch:1,Co:1},str:["Matt committed to owners meeting Monday — 'I'll run it up the flagpole'","Month-end discount and urgency deployed effectively","Tuesday check-in booked before call ended"],opp:["83.5% rep talk ratio on a proposal call — highest flag of the week","Shelly's integration questions needed more preparation"],q:"I think it's going to be a great tool to be honest.",coach:"Matt saying 'I think it's going to be a great tool to be honest' is a closing moment. Spencer kept talking.<br><br>In Voss's framework, when a prospect gives you that sentence, the correct response is silence — followed by: 'Matt, it sounds like you believe this is the right decision. What would need to happen for the ownership group to agree on Monday?' That question does two things: it treats Matt as a co-strategist for the close, and it surfaces any remaining objections before they surface in the owners meeting without Spencer in the room.<br><br>The 83.5% talk ratio on a proposal call is the week's most significant execution gap. Proposal calls are not presentations — they are closing conversations. The prospect should be raising objections, asking clarifying questions, doing the internal math. Spencer's monologue compressed that space. Every minute Spencer talked was a minute Shelly wasn't able to raise her integration question, which then came in late and without the SE context to handle it cleanly.<br><br>The deal has real momentum: owners meeting Monday March 23, Tuesday check-in booked, month-end incentive active. But Spencer is doing all the work when the work should be Matt's. 'Matt, you know your ownership group better than I do — what objections are you expecting?' takes 10 seconds and gives Spencer the entire roadmap for the Monday owners meeting.",prep:["Call or text Matt Sunday night: 'Thinking of you ahead of Monday's owners meeting — any last-minute questions I can help you answer?'","Prepare a 1-page executive summary for Matt to distribute at the owners meeting","Ask Matt: 'What objections are you expecting from the group? Let me help you prepare the answers'","Loop Steph in on any integration questions Shelly might raise — have a technical answer ready","If Tuesday check-in shows owners said yes — have a contract ready to send same day"],url:"https://us-29990.app.gong.io/call?id=4326710309454502635"}
];

frameworkCoaching:"Four POV calls in one day reflects a pipeline at scale. <strong>The execution across these calls shows a rep who understands deal stage and adapts accordingly</strong>. Covius was intelligence-first. Mission was engagement-first. TexasBank was close-first. Gulf Coast was technical-first. The variance is appropriate — not every POV call needs the same playbook.<br><br>The Metrics gap is consistent across all four. Mission Mortgage, Gulf Coast, and Covius each had clear operational pain (Encompass friction, income discrepancies, manual data scraping at 750 pages per file) but no cost attached to it. Gap Selling's quantification imperative is simple: <strong>when the prospect describes pain, your next job is to help them put a dollar value on it</strong>. 'What does it cost your team today to manually process those documents? How many hours per file, and at what fully-loaded labor cost?' If Dustin at Covius knows that number, the ROI case is bulletproof. If he doesn't, Kyle can build it with him on the call — which creates shared ownership of the business case.<br><br>The Economic Buyer is unidentified across all four POV calls. On deals approaching POC execution or contract review, this becomes a deal-level risk. One question, asked on Tuesday: 'As we move toward a proposal — who else on your side needs to be part of that conversation?'"

frameworkCoaching:"The contrast between First World and Traditions tells the whole coaching story. <strong>When structure is applied early, deals advance. When structure is deferred, deals stall.</strong><br><br>First World worked because the kickoff structure created explicit commitments: 15 files by Thursday, review call booked. Brad and Dan are now accountable to outcomes, not just interested. That accountability is what turns a demo into a decision.<br><br>Traditions had better prospect engagement — Brad and Dan were more animated, more technical, more invested. But without a booked next step, that energy dissipates. Challenger Sale's 'take control' principle applies directly: commercial control does not mean pressure. It means you own the timeline. 'Brad, let's just put 30 minutes on the calendar for Thursday — does that work?' is not pressure. It is professionalism. The absence of it sends a different signal.<br><br>On MEDDPICC: Charlie has no Economic Buyer on either call this week. The ownership group at Traditions is the decision body — and it is uncharted territory. At First World, with four people on the call, the hierarchy was never clarified. <strong>The question 'who makes the final call?' should be asked on every call before a POV or proposal is initiated</strong>. Not aggressively — conversationally. 'Sean, as you go through the POV — who is going to be reviewing the results with you, and who makes the final decision?' It is the single question that unlocks the entire deal map."

if(co.frameworkCoaching){
h+=`<div class="card" style="margin-bottom:14px;border-left:3px solid #8b5cf6"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase">Framework Coaching: ${rd.name}</div>`;
h+=`<div style="font-size:12px;color:#94a3b8;line-height:1.8">${co.frameworkCoaching}</div>`;
h+=`</div>`;
}
// Call list (below coaching)
h+=`<div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase">Calls This Week</div>`;
f.forEach(c=>{
h+=`<div class="card call-row" style="border-left-color:${sc(c.w)}" onclick="st.sel=${c.id};render()"><div style="display:flex;justify-content:space-between;align-items:center;gap:6px"><div style="flex:1;min-width:160px"><div style="font-size:13px;font-weight:600">${c.title}</div><div style="font-size:10px;color:#64748b">${c.prospect} · ${c.date} · ${c.dur}</div></div><div style="display:flex;gap:2px" class="dots-wrap">`;
MK.forEach(k=>{h+=`<span class="dot ${c.m[k]?"dot-on":"dot-off"}"></span>`});
h+=`</div><div style="font-size:18px;font-weight:700;color:${sc(c.w)};min-width:36px;text-align:right">${c.w}</div><div style="color:#475569">›</div></div></div>`;
});
}

// ── MEDDPICC VIEW ──
if(st.view==="meddpicc"&&!det){
const mf=MK.map(k=>({k,l:ML[k],n:f.filter(c=>c.m[k]).length,f:f.filter(c=>c.m[k]).length>=Math.ceil(f.length*.7)?"Always":f.filter(c=>c.m[k]).length>=Math.ceil(f.length*.3)?"Sometimes":"Rarely"}));
h+=`<div class="card" style="overflow-x:auto"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">MEDDPICC — ${rd.name} (${f.length} calls)</div><table><thead><tr><th>Element</th>`;
f.forEach(c=>{h+=`<th style="text-align:center;font-size:9px;max-width:70px">${c.title.split(" ")[0]}</th>`});
h+=`<th style="text-align:center">Freq</th></tr></thead><tbody>`;
mf.forEach(m=>{
h+=`<tr><td><span class="mono" style="color:#93c5fd;font-size:10px;margin-right:3px">${m.k}</span><span style="color:#94a3b8">${m.l}</span></td>`;
f.forEach(c=>{h+=`<td style="text-align:center"><div style="width:18px;height:18px;border-radius:3px;margin:0 auto;display:flex;align-items:center;justify-content:center;background:${c.m[m.k]?"rgba(16,185,129,0.15)":"rgba(239,68,68,0.06)"};color:${c.m[m.k]?"#10b981":"#475569"};font-size:11px;font-weight:600">${c.m[m.k]?"✓":"—"}</div></td>`});
const fc=m.f==="Always"?"#10b981":m.f==="Sometimes"?"#f59e0b":"#ef4444";
const fb=m.f==="Always"?"rgba(16,185,129,0.15)":m.f==="Sometimes"?"rgba(245,158,11,0.15)":"rgba(239,68,68,0.1)";
h+=`<td style="text-align:center"><span class="tag mono" style="background:${fb};color:${fc}">${m.f}</span></td></tr>`;
});
h+=`</tbody></table></div>`;
}

// ── HISTORY VIEW ──
if(st.view==="history"&&!det){
const repHist=history.map(w=>{const rh=w.reps.find(r=>r.id===st.rep);return rh?{weekOf:w.weekOf,...rh}:null}).filter(Boolean);
if(history.length<3){
h+=`<div class="card" style="text-align:center;padding:40px 20px">`;
h+=`<div style="font-size:48px;margin-bottom:12px;opacity:0.3">📊</div>`;
h+=`<div style="font-size:16px;font-weight:600;color:#64748b;margin-bottom:6px">Collecting History</div>`;
h+=`<div style="font-size:12px;color:#475569;line-height:1.6">Score trends and weekly coaching will appear here after 3 weeks of data.<br>`;
h+=`<span style="color:#3b82f6;font-weight:600">${history.length}/3 weeks</span> collected so far.</div>`;
h+=`<div style="margin-top:16px;display:flex;gap:6px;justify-content:center">`;
for(let i=0;i<3;i++){
h+=`<div style="width:32px;height:32px;border-radius:6px;border:2px solid ${i<history.length?"#10b981":"#1e293b"};background:${i<history.length?"rgba(16,185,129,0.1)":"transparent"};display:flex;align-items:center;justify-content:center;font-size:11px;color:${i<history.length?"#10b981":"#475569"}">${i<history.length?"✓":i+1}</div>`;
}
h+=`</div></div>`;
} else {
// Score trend table
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">SCORE TREND — ${rd.name}</div>`;
h+=`<table><thead><tr><th>Week</th><th style="text-align:center">Avg</th><th style="text-align:center">Calls</th>`;
DK.forEach(d=>{h+=`<th style="text-align:center">${DL[d].slice(0,3)}</th>`});
h+=`</tr></thead><tbody>`;
repHist.forEach(w=>{
h+=`<tr><td class="mono" style="color:#94a3b8;font-size:10px">${w.weekOf}</td>`;
h+=`<td style="text-align:center;font-weight:700;color:${sc(w.avg)}">${w.avg}</td>`;
h+=`<td style="text-align:center;color:#8b5cf6">${w.n}</td>`;
DK.forEach(d=>{
const v=w.scores[d];
h+=`<td style="text-align:center;color:${v>=8?"#10b981":v>=7?"#3b82f6":"#f59e0b"}">${v.toFixed(1)}</td>`;
});
h+=`</tr>`;
});
h+=`</tbody></table></div>`;

// Visual trend bars
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">WEEKLY TREND</div>`;
h+=`<div style="display:flex;align-items:end;gap:8px;height:60px;padding:0 4px">`;
repHist.forEach((w,i)=>{
const pct=((w.avg-5)/5)*100;
h+=`<div style="flex:1;text-align:center"><div style="height:${Math.max(pct,10)}%;background:${sc(w.avg)};border-radius:3px 3px 0 0;min-height:8px;margin:0 auto;max-width:40px;position:relative;height:${pct}px">`;
h+=`<div style="position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:${sc(w.avg)}">${w.avg}</div>`;
h+=`</div><div class="mono" style="font-size:8px;color:#475569;margin-top:4px">${w.weekOf.slice(5)}</div></div>`;
});
h+=`</div></div>`;

// Weekly coaching history
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:10px;letter-spacing:1px">COACHING HISTORY — ${rd.name}</div>`;
repHist.slice().reverse().forEach(w=>{
h+=`<div class="history-week"><div class="mono" style="font-size:10px;color:#64748b;margin-bottom:6px">Week of ${w.weekOf}</div>`;
h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px">`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#10b981;margin-bottom:2px">KEEP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.keep}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#f59e0b;margin-bottom:2px">START</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.start}</div></div>`;
h+=`<div><div style="font-size:9px;font-weight:600;color:#ef4444;margin-bottom:2px">STOP</div><div style="font-size:10px;color:#94a3b8;line-height:1.4">${w.coaching.stop}</div></div>`;
h+=`</div></div>`;
});
h+=`</div>`;
}
}

// ── CALL DETAIL VIEW ──
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Stage: ${det.stage} · Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;
DK.forEach(d=>{
const s=det.s[d];const bg=s>=8?"#10b981":s>=7?"#f59e0b":"#ef4444";
h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0"><span style="font-size:11px;color:#94a3b8;min-width:110px">${DL[d]} <span style="color:#475569;font-size:9px">(${DW[d]})</span></span><div style="display:flex;align-items:center;gap:6px"><div class="bar"><div class="fill" style="width:${s*10}%;background:${bg}"></div></div><span style="font-size:11px;font-weight:600;color:${bg};min-width:20px">${s}</span></div></div>`;
});
h+=`<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:10px">`;
MK.forEach(k=>{h+=`<div class="tag mono" style="background:${det.m[k]?"rgba(16,185,129,0.12)":"rgba(100,116,139,0.06)"};color:${det.m[k]?"#10b981":"#475569"};border:1px solid ${det.m[k]?"rgba(16,185,129,0.25)":"#1e293b"}">${k}</div>`});
h+=`</div></div>`;
h+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0" class="detail-grid">`;
h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:6px">STRENGTHS</div>`;
det.str.forEach(s=>{h+=`<div class="strength">${s}</div>`});
h+=`</div><div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#f59e0b;margin-bottom:6px">OPPORTUNITIES</div>`;
det.opp.forEach(o=>{h+=`<div class="opp">${o}</div>`});
h+=`</div></div>`;
if(det.coach){h+=`<div class="card" style="border-left:3px solid #3b82f6"><div class="mono" style="font-size:10px;font-weight:600;color:#93c5fd;margin-bottom:6px">COACHING</div><div style="font-size:12px;color:#94a3b8;line-height:1.7">${det.coach}</div></div>`}
if(det.prep&&det.prep.length){h+=`<div class="card" style="border-left:3px solid #10b981"><div class="mono" style="font-size:10px;font-weight:600;color:#10b981;margin-bottom:8px">NEXT CALL PREP</div>`;det.prep.forEach((p,i)=>{h+=`<div style="display:flex;gap:8px;align-items:flex-start;margin-bottom:${i<det.prep.length-1?8:0}px"><div style="min-width:18px;height:18px;border-radius:4px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.25);display:flex;align-items:center;justify-content:center;font-size:9px;color:#10b981;font-weight:600">${i+1}</div><div style="font-size:12px;color:#94a3b8;line-height:1.5">${p}</div></div>`});h+=`</div>`}
if(det.q){h+=`<div class="card"><div class="mono" style="font-size:10px;font-weight:600;color:#8b5cf6;margin-bottom:4px">KEY QUOTE</div><div style="font-size:13px;color:#e2e8f0;font-style:italic;border-left:3px solid #8b5cf6;padding-left:10px">"${det.q}"${det.qt?` <span class="mono" style="font-size:9px;color:#475569;font-style:normal">${det.qt}</span>`:""}</div></div>`}
h+=`<a href="${det.url}" target="_blank" class="mono" style="font-size:10px;display:inline-block;margin-top:8px">View in Gong →</a>`;
}

h+=`<div style="margin-top:20px;text-align:center;font-size:9px;color:#1e293b" class="mono">v9 rubric · MEDDPICC 30% · Gap Selling 30% · Challenger 25% · NSTD 15% · ${calls.length} calls · 4 reps</div>`;
el.innerHTML=h;
}
render();
</script>
</div><!-- end dashboard-content -->
<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}
function authCheck(){
  var e=document.getElementById('auth-email').value.trim().toLowerCase();
  if(e.endsWith('@ocrolus.com')){
    localStorage.setItem('ae-scorer-auth',e);
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(e,'login');
  } else {
    document.getElementById('auth-error').style.display='block';
  }
}
(function(){
  var saved=localStorage.getItem('ae-scorer-auth');
  if(saved && saved.endsWith('@ocrolus.com')){
    document.getElementById('auth-gate').style.display='none';
    document.getElementById('dashboard-content').style.display='block';
    logAccess(saved,'return_visit');
  }
})();
</script>
</body>
</html>
