a{color:#3b82f6;text-decoration:none}a:hover{text-decoration:underline}
table{width:100%;border-collapse:collapse}

.trend-bar{display:flex;align-items:end;gap:3px;height:40px}

.history-week{border-left:3px solid #1e293b;padding:10px 14px;margin-bottom:8px;transition:all .15s}
.history-week:hover{background:#111827;border-left-color:#3b82f6}
@media(max-width:640px){
body{padding:14px 10px}
h1{font-size:18px!important}
.tab{padding:6px 10px;min-width:0!important;flex:1 1 calc(50% - 4px)!important}
.tab .name{font-size:12px}
.tab .sub{font-size:9px}
.kpi-grid{grid-template-columns:repeat(2,1fr)!important;gap:6px}
.kpi{padding:10px 10px}
.kpi .label{font-size:9px}
.coaching-grid{grid-template-columns:1fr!important}
.call-row{padding:10px 10px;min-height:44px}
.dots-wrap{display:none!important}
table{font-size:10px;display:block;overflow-x:auto;-webkit-overflow-scrolling:touch}
th,td{padding:4px 5px;font-size:10px;white-space:nowrap}
.detail-grid{grid-template-columns:1fr!important}
.bar{width:60px}
.vtab{padding:5px 10px;font-size:9px;min-height:36px}
.card{padding:12px}
.tag{font-size:8px;padding:2px 5px}
}

to involve legal team for detailed policy review"],"opp":["Discovery questioning was surface-level - missed opportunities to explore business impact, decision criteria, and economic implications of their Encompass transition","No clear advancement structure established beyond single follow-up meeting - should have secured multi-step evaluation process"],"q":"I'm like that doesn't mean anything unless I know what the detail is. And is there a limit? Are you just going to, are you going to buy the whole loan or are you going to just pay me what I'm losing?","coach":"The transcript shows excellent rapport building through personal connection and shared experiences, creating a comfortable environment for technical discussion. However, discovery opportunities were missed - when the prospect mentioned moving from Path to Encompass, you could have used Gap Selling principles to explore the business drivers: 'What challenges with Path led to this decision?' The prospect's detailed questioning about rep/warranty shows high engagement, but you should have leveraged this as a buying signal to explore broader decision criteria: 'Beyond rep/warranty terms, what other factors will influence your vendor selection?' Your offer to involve legal team demonstrates good advancement, but structure this as part of a broader evaluation timeline rather than an isolated call.","prep":["Prepare discovery questions around the Path to Encompass migration - business drivers, timeline, success metrics","Research CME's current income verification process and quantify potential ROI with specific volume assumptions","Develop multi-step advancement plan beyond legal review - technical evaluation, pilot program, stakeholder alignment"],"url":"https://us-29990.app.gong.io/call?id=5621670770442726823"},{"id":5,"rep":"sam","title":"VanDyk X Ocrolus - Roadmap and Conditioning","prospect":"Multiple stakeholders","date":"Mon 3/30","dur":"30m","type":"Closing","stage":"Closing","s":{"r":7,"d":4,"v":6,"a":8, ness case established for the solution"],"q":"I'm kind of new to the conversation, right? As it relates to the mechanics of what we're trying to do","coach":"While the skiing conversation built excellent rapport, the call lacked any business substance. When transitioning to business topics, use bridge phrases like 'Before we dive into the technical details with Corey, help me understand your current document processing challenges.' The rep should have used the developer's absence as an opportunity for business discovery rather than immediately rescheduling. Practice transitioning from rapport to discovery with phrases like 'That skiing trip sounds amazing - speaking of getting from point A to point B efficiently, tell me about your current loan processing workflow.'","prep":["Prepare 3-5 current state discovery questions about their document processing workflow before the Tuesday call","Research NEXA's business model and typical pain points in their industry","Create a transition script to move from rapport building to business discovery","Develop questions about their technical requirements and integration needs for the Tuesday technical discussion"],"url":"https://us-29990.app.gong.io/call?id=225311546537734570"},{"id":7,"rep":"kyle","title":"Ocrolus <> Mortgage Financial Services Proposal","prospect":"Multiple stakeholders","date":"Mon 3/30","dur":"31m","type":"Pricing","stage":"Pricing","s":{"r":6,"d":3,"v":7,"a":8,"c":7,"e":6},"w":5.75,"tr":75,"m":{"M":0,"E":0,"DC":0,"DP":1,"IP":0,"Ch":0,"Co":0},"str":["Strong ROI quantification with specific metrics - 1.4 hours saved per loan file, $10K processor savings monthly","Excellent closing momentum securing verbal commitment with timeline commitment from prospect"],"opp":["Minimal discovery depth shown in transcript - need more calibrated questions to uncover decision criteria and process","Limited MEDDPICC coverage beyond decision process - champion identification and compelling event unclear"],"q":"If you give me that tonight or in the morning, I meet with, when we're done, I'm going to go over this with Debbie and Tracy, and Kelly, and, if we're all on board, I'll have it signed tonight or in the morning and back to you","coach":"The rep demonstrated strong Problem Solver capabilities by delivering quantified value with specific savings calculations ($10K processor, $30K underwriter monthly savings). However, the transcript shows limited discovery depth - instead of asking 'Do you have any generalized feedback?' try 'What concerns do you have about achieving these savings?' The closing was well-executed with the prospect volunteering their decision timeline, but earlier in the call, use more calibrated questions like 'How does your team typically evaluate ROI projections like this?' to better understand their decision criteria.","prep":["Prepare discovery questions to uncover decision criteria and evaluation process beyond the technical ROI","Map the decision-making unit - identify roles of Debbie, Tracy, and Kelly mentioned in closing","Develop compelling event questions to understand urgency and timeline drivers","Create champion identification strategy to determine internal advocate strength"],"url":"https://us-29990.app.gong.io/call?id=8805151809007990393"},{"id":8,"rep":"kyle","title":"Ocrolus <> Verity (Demo & Partnership Discovery)","prospect":"Multiple stakeholders","date":"Mon 3/30","dur":"48m","type":"Initial Demo","stage":"Initial Demo","s":{"r":7,"d":4,"v":6,"a":7,"c":5,"e":6},"w":5.45,"tr":34,"m":{"M":0,"E":0,"DC":1,"DP":0,"IP":1,"Ch":0,"Co":0},"str":["Strong opening rapport with natural conversation about Vegas weekend that created connection","Clear technical value demonstration showing document classification solution"],"opp":["Missed critical discovery opportunities around business impact and decision criteria","No exploration of economic buyer or decision process despite partnership nature"],"q":"the challenge is if you request a bank statement and they upload a pay stub. And then it goes into that bucket. You've got, you know, a lost document, you don't know where it is. And we fix that.","coach":"The transcript shows excellent rapport building through personal Vegas conversation that felt authentic rather than forced. The technical demonstration clearly articulated the document misclassification problem with specific examples like 'pay stub in W2 folder.' However, the rep missed key discovery moments when Kyle asked technical integration questions - these were perfect opportunities to explore current pain points with phrases like 'Help me understand what happens today when documents get misclassified' or 'What's the business impact when a document gets lost in the wrong bucket?' The partnership context suggests multiple stakeholders, yet no exploration of decision-making process occurred.","prep":["Prepare discovery questions about current document processing volumes and error rates","Research Verity's existing tech stack and integration requirements before POV","Develop questions about partnership decision criteria and timeline","Create ROI framework showing cost of document misclassification","Map out likely stakeholders involved in partnership decision"],"url":"https://us-29990.app.gong.io/call?id=2650685726948261588"},{"id":9,"rep":"kyle","title":"Ocrolus <> Pinnacle Bank Next Steps","prospect":"Multiple stakeholders","date":"Mon 3/30","dur":"10m","type":"Closing","stage":"Closing","s":{"r":8,"d":2,"v":3,"a":7,"c":4,"e":6},"w":4.45,"tr":56,"m":{"M":0,"E":0,"DC":0,"DP":0,"IP":0,"Ch":0,"Co":0},"str":["Excellent rapport building through personal connections around golf and family","Strong advancement with clear next steps and timeline established"],"opp":["Missed critical discovery on implementation details and decision process","Failed to reinforce value proposition or ROI during closing conversation"],"q":"I think everything's good on my end to pull the trigger and move forward","coach":"The transcript shows stron const coaching={"sam":{"narrative":"Five calls this week with scores ranging from 5.35 to 7.15, showing strong technical capability but inconsistent business impact discovery. The CME Lending demo (7.15) demonstrated your potential when rapport and advancement align, while the My City Home Loans POV check-in (5.35) highlighted missed opportunities to quantify business value. Talk time hovered around 50-59% except for the POV call where you appropriately listened more at 41%.","keep":"<strong>Strong technical demonstration capabilities.</strong> Your handling of complex questions about Freddie Mac differences at Sistar and rep/warranty details at CME showed deep product knowledge. You consistently provided clear context and functionality explanations that kept prospects engaged.","start":"<strong>Using calibrated questions to uncover current state pain.</strong> At Fox Valley when Troy mentioned demographic challenges with older customers, you missed a Gap Selling opportunity to diagnose their current process pain. Replace acceptance of vague timelines with questions like 'What would need to happen for this to become a priority?'","stop":"<strong>Accepting surface-level responses during discovery.</strong> At VanDyk when Jeanie mentioned 'internal conversations with other vendors,' you moved on instead of probing deeper. This was a critical moment requiring follow-up like 'What seems to be the biggest concern your team has?'","frameworkCoaching":"Your technical prowess is evident across all five calls, but you're leaving significant business impact on the table by not fully leveraging Gap Selling principles. When prospects reveal current state challenges — like Troy's demographic issues at Fox Valley or the Path-to-Encompass migration at CME — these are golden opportunities to diagnose quantifiable pain points. Instead of moving directly to solution demonstration, pause and explore: What's the business cost of their current process? How does inefficiency impact their ns into business discovery using calibrated questions.</strong> The NEXA skiing conversation and Pinnacle golf discussion were excellent for relationship building, but you missed transition opportunities. When prospects share personal context, respond with phrases like 'That sounds amazing - speaking of efficiency, tell me about your current loan processing workflow' to naturally shift into discovery while maintaining the connection.","stop":"<strong>Accepting surface-level responses during critical discovery moments.</strong> On the Verity call, when Kyle asked technical integration questions, you answered directly instead of exploring the underlying pain. When prospects volunteer problems, respond with 'Help me understand what happens today when that breaks down' rather than immediately providing solutions.","frameworkCoaching":"Your calls this week demonstrate strong Problem Solver skills, but you're leaving Challenger opportunities on the table. When Leslie at Mission Mortgage discussed underwriting team pushback and FHA calculations, this was a perfect moment to quantify the cost of status quo versus automated accuracy. Instead of just acknowledging their challenges, frame the business impact: 'What's the cost when your team spends extra time on manual calculations versus focusing on exceptions that actually need human judgment?' This positions you as someone who understands the downstream effects of their current process, not just the immediate technical problem.<br><br>Your closing conversations need more concrete mutual action plans. The Steadfast call ended with 'let's take a look at it' - vague commitments create stalled deals. Even when rapport is strong and interest is high, advance with specific next steps that include dates, deliverables, and stakeholders. Try 'Based on what we've discussed, I'd like to propose we schedule 90 minutes next Tuesday for a technical deep-dive with your processing team. Can you confirm Sarah and Mike will be available?' This creates accountability while maintaining the collaborative tone you've mastered.<br><br>Your MEDDPICC execution shows gaps in consistent qualification discipline. Strong deals like Mission Mortgage captured Economic Buyer and Decision Process, while similar-stage opportunities like Steadfast have no MEDDPICC elements documented. Even during implementation calls like IBC, ask discovery questions that uncover expansion opportunities: 'What does success look like 90 days from now?' positions you as a strategic partner while gathering intelligence for future upsell conversations."},"charlie":{"narrative":"","keep":"","start":"","stop":"","frameworkCoaching":""},"spencer":{"narrative":"Three calls this week showed consistent rapport-building strength but revealed systematic gaps in quantifying business impact and securing concrete advancement. The Glacier demo (6.05) had the strongest overall execution, while both the Home Financing Center kickoff (5.25) and Square proposal meeting (4.85) demonstrated missed opportunities to convert customer pain into measurable value.","keep":"<strong>Your rapport building creates genuine customer connection.</strong> The ICE conference reference with Holly at Glacier and your authentic interest in Kishan's paternity leave at Square establish trust that opens doors. This foundation is critical for the deeper business conversations you need to build on top of it.","start":"<strong>Quantify every pain point the moment customers express it.</strong> When Holly said processing efficiency improvements 'would be huge' and Quinton mentioned 2-3 day processing times, these were perfect moments to calculate specific time and cost savings. Transform emotional reactions into dollar figures immediately with questions like 'How much time does your team spend daily on mislabeled documents?'","stop":"<strong>Accepting vague next steps without concrete commitment.</strong> 'We'll meet this afternoon' at Glacier and 'let me give you an answer next week' at Square both lack specificity and accountability. Instead of nodding along, secure defined outcomes: 'What would need to be true for you to move forward with a pilot?' or 'When we meet with Andrea next week, what specific data points will be most compelling to her?'","frameworkCoaching":"Your discovery approach needs to shift from information gathering to value creation. When customers volunteer pain points like Quinton's processing delays or Kishan's 'tens of millions vs 50 million' opportunity sizing, you're getting invitations to teach rather than just probe. The Square call perfectly illustrated this when Kishan explicitly asked 'how can we help you make the business case?' — this was a Challenger moment requiring you to provide ROI frameworks or benchmarking data, not another question.<br><br>The pattern across all three calls shows you're leaving money on the table by not quantifying impact in real-time. When Holly expressed enthusiasm about efficiency gains, immediately calculating potential savings would have created urgency and differentiated your approach. The Home Financing Center explicitly stating they don't track metrics wasn't an obstacle — it was an opportunity to position success measurement as partnership value. Transform these moments from discovery gaps into competitive advantages by teaching customers how to think about their problems differently."}};

ons about the Encompass workflows — would a 20-minute focused session be useful for your team?' creates a second thread into the account.<br><br>On MEDDPICC: the Economic Buyer and Decision Process remain unidentified on a call that reached pricing. John 'letting Austin in' mid-call suggests John is the decision-maker, but that assumption needs to be validated. 'John, when you decide to move forward on a tool like this, who else is typically part of that conversation?' is a natural close question that unlocks the path to signature.","prep":["Ask John to quantify the capacity lift in dollar terms","Reach out to Austin directly for a focused Encompass workflow deep-dive","Ask about the decision process: who else is involved?","Probe competitive landscape before Tuesday","Build a preliminary ROI model using their team size and estimated file volume"],"url":"https://us-29990.app.gong.io/call?id=4567477048525966914"},{"id":2,"rep":"sam","title":"HMA Pricing","prospect":"Amy, Andrew (HMA)","date":"Mon 3/16","dur":"31m","type":"Pricing","stage":"Late Eval","s":{"r":8,"d":7,"v":8,"a":8,"c":7,"e":7},"w":7.45,"tr":75,"m":{"M":1,"E":0,"DC":1,"DP":1,"IP":0,"Ch":1,"Co":0},"str":["ROI calculator ready — walked through per-processor/UW economics","Offered success-based pricing structure for flexibility","Monday follow-up with product head Becca booked on-call"],"opp":["75% rep talk ratio too high even for pricing call","Partner approval path not mapped before close"],"q":"When you get done hobnobbing down there in vegas, let me know, let's get back on the phone and walk through that.","coach":"Arriving at a pricing call from ICE with an ROI calculator and a success-based pricing alternative is exactly the preparation this stage demands. Andrew's positive reaction confirms the flexibility framing landed. Monday 10am with Becca and the HMA team is a strong, specific next step.<br><br>The critical data point: 75% rep talk ratio on a pricing call. At the pricing stage, the prospect should be doing the math out loud — not listening. That question, asked three or four times throughout the ROI walkthrough, creates the conversation that builds internal commitment.<br><br>The partner approval element was mentioned but not mapped. Amy referenced partners needing to weigh in, and Sam moved past it. The Voss play here is an accusation audit: 'You're probably thinking the partner approval process is going to slow this down.' Saying the scary thing out loud forces Amy to either confirm or disconfirm.<br><br>For MEDDPICC: Metrics (ROI calc) and Decision Process (partner approval) are touched. The Economic Buyer remains unidentified — who at HMA actually signs?","prep":["Ask: who at HMA approves a contract of this size?","Run an accusation audit on the partner approval","Prepare ROI scenarios in 3 tiers for the Becca call","Confirm March end-of-month pricing deadline creates urgency","Map competitive alternatives"],"url":"https://us-29990.app.gong.io/call?id=9085529724274902861"},{"id":3,"rep":"sam","title":"Superior Natl Bank POV","prospect":"Denise, Nicole","date":"Wed 3/19","dur":"31m","type":"POV Check-in","stage":"Testing","s":{"r":5,"d":5,"v":6,"a":6,"c":4,"e":7},"w":5.55,"tr":3,"m":{"M":0,"E":0,"DC":0,"DP":1,"IP":1,"Ch":1,"Co":0},"str":["Denise and Nicole highly engaged with SE Steph throughout","Tomorrow's meeting prep identified as key priority","Product accuracy validated by the team"],"opp":["AE arrived late and contributed 42 words in 31 minutes","SE carried the entire call — AE-prospect relationship at risk"],"q":"I really can't say enough about how pleasant of an experience this has been even through some hiccups.","coach":"This was Steph's call, not Sam's. The 42-word contribution on a 31-minute call is the single largest coaching issue this week. The risk is structural, not cosmetic. When the SE owns the relationship, the AE loses leverage at the table when it matters most: pricing, timeline pressure, and closing.<br><br>The product is clear });

});
h+=`</div>`;
}

// ── CALL DETAIL VIEW ──
if(det){
h+=`<button class="vtab mono" onclick="st.sel=null;render()" style="margin-bottom:10px">← Back</button>`;
h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;margin-bottom:14px"><div><h2 style="font-size:16px;font-weight:700"><a href="${det.url}" target="_blank" style="color:#e2e8f0;text-decoration:none;border-bottom:1px solid #3b82f6;padding-bottom:1px;transition:color .15s" onmouseover="this.style.color='#3b82f6'" onmouseout="this.style.color='#e2e8f0'">${det.title} ↗</a></h2><div style="font-size:11px;color:#64748b;margin-top:2px">${det.prospect} · ${det.date} · ${det.dur} · ${det.type}</div><div style="font-size:10px;color:#475569">Stage: ${det.stage} · Talk: <span style="color:${det.tr<=60?"#10b981":"#f59e0b"}">${det.tr}%</span></div></div><div style="text-align:center"><div style="font-size:28px;font-weight:700;color:${sc(det.w)}">${det.w}</div><div class="mono" style="font-size:9px;color:#475569">WEIGHTED</div></div></div>`;

el.innerHTML=h;
}

<script>
var LOG_URL='https://script.google.com/a/macros/ocrolus.com/s/AKfycbyw1XptLK0hHrGte3OPVMBWaTPq6ipNfg2UmrofEr3m0Qr4jih9qj4tkjtRFufkZQ-b/exec';
function logAccess(email,action){
  if(LOG_URL==='APPS_SCRIPT_URL')return;
  try{var img=new Image();img.src=LOG_URL+'?email='+encodeURIComponent(email)+'&action='+encodeURIComponent(action)+'&ua='+encodeURIComponent(navigator.userAgent)+'&t='+Date.now()}catch(e){}
}

/* --- Google SSO Auth --- */
function decodeJwtPayload(token){
  var base64=token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/');
  return JSON.parse(decodeURIComponent(atob(base64).split('').map(function(c){return '%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)}).join('')));
}

function handleGoogleSignIn(response){
  var payload=decodeJwtPayload(response.credential);
  var email=payload.email||'';
  if(!email.endsWith('@ocrolus.com')){
    document.getElementById('auth-error').style.display='block';
    return;
  }
  // Store session
  localStorage.setItem('ae-scorer-auth',JSON.stringify({
    email:email,
    name:payload.name||email,
    picture:payload.picture||'',
    exp:payload.exp*1000 // convert to ms
  }));
  showDashboard(email,payload.name||email,payload.picture||'');
  logAccess(email,'google_sso_login');
}

function showDashboard(email,name,picture){
  document.getElementById('auth-gate').style.display='none';
  document.getElementById('dashboard-content').style.display='block';
  var bar=document.getElementById('user-bar');
  bar.style.display='flex';
  document.getElementById('user-name').textContent=name;
  if(picture){
    document.getElementById('user-avatar').src=picture;
    document.getElementById('user-avatar').style.display='block';
  } else {
    document.getElementById('user-avatar').style.display='none';
  }
}

function signOut(){
  localStorage.removeItem('ae-scorer-auth');
  document.getElementById('auth-gate').style.display='flex';
  document.getElementById('dashboard-content').style.display='none';
  document.getElementById('user-bar').style.display='none';
  document.getElementById('auth-error').style.display='none';
  logAccess('','sign_out');
  // Revoke Google session
  if(window.google&&google.accounts&&google.accounts.id){
    google.accounts.id.disableAutoSelect();
  }
}

// Check for existing valid session on page load
(function(){
  try{
    var saved=JSON.parse(localStorage.getItem('ae-scorer-auth'));
    if(saved && saved.email && saved.email.endsWith('@ocrolus.com') && saved.exp > Date.now()){
      showDashboard(saved.email,saved.name,saved.picture);
      logAccess(saved.email,'return_visit');
    } else if(saved){
      // Expired — clear it
      localStorage.removeItem('ae-scorer-auth');
    }
  }catch(e){
    // Legacy format or corrupted — clear
    localStorage.removeItem('ae-scorer-auth');
  }
})();
</script>
